services:
  cloudflare-tunnel:
      image: cloudflare/cloudflared:latest
      container_name: cloudflare-tunnel
      restart: unless-stopped
      command: tunnel --no-autoupdate run --token "${CLOUDFLARE_TUNNEL_TOKEN}"
      depends_on:
        - fastapi
        - next-app
      networks:
        - tunnel-network

  fastapi:
    build:
      context: .
      dockerfile: fast-api-app/Dockerfile
    container_name: fastapi
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    networks:
      - tunnel-network
      - backend-network

  next-app:
    build:
      context: .
      dockerfile: next-app/Dockerfile
    container_name: next-app
    env_file: .env
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - fastapi
    networks:
      - backend-network
      - frontend-network
      - tunnel-network

  postgres:
    build:
      context: .
      dockerfile: postgres/Dockerfile
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: recipe
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "5432:5432"
    networks:
      - backend-network

networks:
  backend-network:
    driver: bridge
  frontend-network:
    driver: bridge
  tunnel-network:

volumes:
  postgres_data:
